<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Outer Rim</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- Title Bar -->
    <div id="title-bar">
      <div class="title-bar-drag-region"></div>
      <span class="title-bar-text">Outer Rim</span>
    </div>

    <!-- Main Content -->
    <div id="main-content">
      <div id="upper-section">
        <!-- Dual Pane Container -->
        <div id="dual-pane-container">
          
          <!-- Left Pane: Sidebar -->
          <div id="left-pane" class="sidebar-pane">
            
            <!-- Workspace Section -->
            <div class="sidebar-section">
              <div class="sidebar-section-header">
                <span class="sidebar-section-title">Workspace</span>
                <button id="devtools-btn" class="icon-btn" title="DevTools (F12)">🔧</button>
              </div>
              <div id="workspace-display">
                <div class="workspace-current">
                  <span class="workspace-icon">📁</span>
                  <span id="workspace-name-display">No workspace</span>
                </div>
              </div>
            </div>

            <!-- Folder Section -->
            <div class="sidebar-section">
              <div class="sidebar-section-header">
                <span class="sidebar-section-title">Project Folder</span>
              </div>
              <div class="folder-selector">
                <input type="text" id="folder-path-input" placeholder="Select a folder..." readonly>
                <button id="folder-browse-btn" class="action-btn">Browse</button>
              </div>
              <div id="folder-status" class="folder-status"></div>
            </div>

            <!-- Git Section -->
            <div id="git-section" class="sidebar-section hidden">
              <div class="sidebar-section-header">
                <span class="sidebar-section-title">Git</span>
                <span id="git-status-badge" class="status-badge"></span>
              </div>
              
              <div id="git-status-display" class="git-status-display">
                <span class="git-status-text">Checking...</span>
              </div>

              <div class="git-actions">
                <button id="git-pull-btn" class="git-btn pull-btn">
                  <span class="btn-icon">⬇</span>
                  <span class="btn-text">Pull</span>
                </button>
                <button id="git-push-btn" class="git-btn push-btn">
                  <span class="btn-icon">⬆</span>
                  <span class="btn-text">Push</span>
                </button>
              </div>

              <div class="commit-section">
                <input type="text" id="commit-message" placeholder="Commit message (optional)">
              </div>

              <button id="git-refresh-btn" class="refresh-btn">
                <span>↻</span> Refresh Status
              </button>
            </div>

            <!-- Spacer -->
            <div class="sidebar-spacer"></div>

            <!-- Screenshots Section -->
            <div class="sidebar-section screenshots-section">
              <div class="sidebar-section-header">
                <span class="sidebar-section-title">📸 Screenshots</span>
                <div class="section-actions">
                  <button id="screenshots-refresh" class="icon-btn" title="Refresh">↻</button>
                  <button id="screenshots-delete-all" class="icon-btn danger" title="Delete All">🗑</button>
                </div>
              </div>
              <div id="screenshots-list" class="screenshots-grid"></div>
            </div>
          </div>

          <!-- Pane Resizer -->
          <div id="pane-resizer"></div>

          <!-- Right Pane: Browser -->
          <div id="right-pane" class="pane">
            <div class="pane-tab-bar">
              <div class="pane-tab-list" data-pane="right"></div>
              <button class="pane-add-tab" data-pane="right" title="New Tab">+</button>
              <div class="pane-profile-selector">
                <select class="profile-select" data-pane="right" title="Session Profile">
                  <option value="default">Default</option>
                </select>
                <button class="profile-manage-btn" title="Manage Profiles">⚙</button>
              </div>
            </div>
            <div class="pane-nav-bar hidden" data-pane="right">
              <button class="nav-btn nav-back" data-pane="right" title="Back">◀</button>
              <button class="nav-btn nav-forward" data-pane="right" title="Forward">▶</button>
              <button class="nav-btn nav-refresh" data-pane="right" title="Refresh">↻</button>
              <input type="text" class="nav-url" data-pane="right" placeholder="Enter URL or search...">
            </div>
            <div class="pane-webview-container" data-pane="right">
              <div class="pane-empty-state">
                <p>Click + to open a tab</p>
              </div>
            </div>
          </div>

          <!-- Notepad Resizer -->
          <div id="notepad-resizer"></div>

          <!-- Notepad Panel -->
          <div id="notepad-panel">
            <div class="notepad-header">
              <span class="notepad-title">📝 Notes</span>
              <button id="notepad-toggle" title="Collapse">◀</button>
            </div>
            <textarea id="notepad-content" placeholder="Workspace notes..."></textarea>
          </div>

          <!-- Notepad Expand Button (when collapsed) -->
          <button id="notepad-expand" class="hidden" title="Expand Notes">📝</button>
        </div>
      </div>

      <!-- Workspace Bar -->
      <div id="workspace-bar">
        <div id="workspace-list"></div>
        <button id="add-workspace" class="workspace-add-btn">+ New Workspace</button>
      </div>
    </div>

    <!-- Empty State Overlay -->
    <div id="empty-state-overlay" class="hidden">
      <div class="empty-icon">🚀</div>
      <h2>Welcome to Outer Rim</h2>
      <p>Create a workspace to get started</p>
      <button id="empty-create-workspace">Create Workspace</button>
    </div>

    <!-- Workspace Modal -->
    <div id="modal-overlay" class="hidden">
      <div id="modal">
        <h3 id="modal-title">New Workspace</h3>
        <input type="text" id="workspace-name-input" placeholder="Workspace name">
        <div class="modal-actions">
          <button id="modal-cancel" class="btn-secondary">Cancel</button>
          <button id="modal-confirm" class="btn-primary">Create</button>
        </div>
      </div>
    </div>

    <!-- Tab Modal -->
    <div id="tab-modal-overlay" class="hidden">
      <div id="tab-modal">
        <h3>New Tab</h3>
        <input type="text" id="tab-url-input" placeholder="Enter URL or search term">
        <div class="quick-links">
          <button class="quick-link" data-url="https://claude.ai">Claude</button>
          <button class="quick-link" data-url="https://github.com">GitHub</button>
          <button class="quick-link" data-url="https://google.com">Google</button>
        </div>
        <div class="modal-actions">
          <button id="tab-modal-cancel" class="btn-secondary">Cancel</button>
          <button id="tab-modal-confirm" class="btn-primary">Open</button>
        </div>
      </div>
    </div>

    <!-- Profile Modal -->
    <div id="profile-modal-overlay" class="hidden">
      <div id="profile-modal">
        <h3>Manage Session Profiles</h3>
        <p class="profile-modal-desc">Each profile has isolated cookies/sessions.</p>
        <div id="profile-list"></div>
        <div class="profile-add-row">
          <input type="text" id="new-profile-input" placeholder="New profile name...">
          <button id="add-profile-btn" class="btn-primary">Add</button>
        </div>
        <div class="modal-actions">
          <button id="profile-modal-close" class="btn-secondary">Close</button>
        </div>
      </div>
    </div>

    <!-- Screenshot Preview Modal -->
    <div id="screenshot-preview-overlay" class="hidden">
      <div id="screenshot-preview">
        <img id="screenshot-preview-img" src="" alt="Screenshot preview">
        <div class="screenshot-preview-actions">
          <button id="screenshot-copy" class="btn-primary">Copy to Clipboard</button>
          <button id="screenshot-delete" class="btn-danger">Delete</button>
          <button id="screenshot-close" class="btn-secondary">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
